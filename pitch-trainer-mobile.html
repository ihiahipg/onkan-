<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音感トレーニング - スマホ共有版</title>
    <link rel="icon" href="data:," />
    <style>
:root {
  color-scheme: dark;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0a0a0a;
  color: #eeeeee;
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
  margin: 0;
  overscroll-behavior: contain;
  -webkit-text-size-adjust: 100%;
}

button,
input {
  font: inherit;
}

.app-shell {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: max(12px, env(safe-area-inset-top)) 16px max(12px, env(safe-area-inset-bottom));
}

.app-header {
  text-align: center;
  margin-bottom: 14px;
}

.eyebrow {
  margin: 0 0 6px;
  font-size: 10px;
  letter-spacing: 6px;
  color: #555555;
}

h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 1px;
}

.streak {
  margin: 6px 0 0;
  min-height: 17px;
  font-size: 12px;
  color: #8a8a8a;
}

.trainer-card {
  width: 100%;
  max-width: 360px;
  margin-bottom: 12px;
  padding: 14px 8px 16px;
  border: 1px solid #2a2a2a;
  border-radius: 18px;
  background: #161616;
  box-shadow: 0 2px 24px rgba(0, 0, 0, 0.5);
  transition: box-shadow 0.2s;
}

.trainer-card.correct {
  box-shadow: 0 0 0 4px rgba(61, 220, 102, 0.33), 0 2px 32px rgba(61, 220, 102, 0.18);
}

.status-text {
  min-height: 22px;
  margin: 0 0 8px;
  text-align: center;
  font-size: 13px;
  color: #6a6a6a;
}

.status-text.correct {
  color: #3ddc66;
  font-weight: 600;
}

.score-wrap {
  touch-action: none;
}

.score {
  display: block;
  width: min(320px, calc(100vw - 48px), calc((100dvh - 360px) * 0.6956));
  min-width: 220px;
  height: auto;
  aspect-ratio: 320 / 460;
  max-width: 100%;
  margin: 0 auto;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

.script-warning {
  margin: 10px auto 0;
  max-width: 300px;
  border: 1px solid #3a2c12;
  border-radius: 8px;
  padding: 10px 12px;
  background: #191206;
  color: #e7bc67;
  font-size: 12px;
  line-height: 1.55;
  text-align: left;
}

.js-enabled .script-warning {
  display: none;
}

.actions {
  display: flex;
  width: 100%;
  max-width: 360px;
  gap: 10px;
  margin-bottom: 12px;
}

.button {
  flex: 1;
  min-height: 48px;
  padding: 14px;
  border: 1px solid #333333;
  border-radius: 10px;
  background: #161616;
  color: #cccccc;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}

.button-primary {
  border-color: #eeeeee;
  background: #eeeeee;
  color: #0a0a0a;
}

.settings {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px 18px;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  background: #161616;
}

.check-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
}

.check-row input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.fake-check {
  width: 18px;
  height: 18px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  margin-top: 2px;
  border: 1.5px solid #444444;
  border-radius: 4px;
  transition: background 0.15s, border-color 0.15s;
}

.fake-check::after {
  content: "";
  width: 8px;
  height: 4px;
  border-left: 2px solid #0a0a0a;
  border-bottom: 2px solid #0a0a0a;
  transform: translateY(-1px) rotate(-45deg);
  opacity: 0;
}

.check-row input:checked + .fake-check {
  border-color: #eeeeee;
  background: #eeeeee;
}

.check-row input:checked + .fake-check::after {
  opacity: 1;
}

.check-title,
.check-sub {
  display: block;
}

.check-title {
  font-size: 13px;
  font-weight: 500;
  color: #dddddd;
}

.check-sub {
  margin-top: 2px;
  font-size: 11px;
  color: #666666;
}

.divider {
  border-top: 1px solid #2a2a2a;
}

.note {
  margin: 10px 0 0;
  text-align: center;
  font-size: 11px;
  line-height: 1.8;
  color: #444444;
}

@media (max-width: 380px) {
  .app-shell {
    padding-inline: 10px;
  }

  .trainer-card {
    padding-inline: 6px;
  }
}

@media (max-height: 720px) {
  .app-shell {
    padding-top: 10px;
  }

  .app-header {
    margin-bottom: 8px;
  }

  .eyebrow,
  .note {
    display: none;
  }

  h1 {
    font-size: 18px;
  }

  .trainer-card {
    margin-bottom: 10px;
    padding-top: 10px;
    padding-bottom: 12px;
  }

  .score {
    width: min(292px, calc(100vw - 48px), calc((100dvh - 268px) * 0.6956));
  }

  .settings {
    gap: 10px;
    padding-block: 10px;
  }
}

@media (max-height: 640px) {
  .score {
    width: min(260px, calc(100vw - 48px), calc((100dvh - 230px) * 0.6956));
  }

  .check-sub {
    display: none;
  }
}

    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">PITCH TRAINER</p>
        <h1>音感トレーニング</h1>
        <p id="streak" class="streak" hidden></p>
      </header>

      <section id="trainerCard" class="trainer-card" aria-label="音感トレーニング">
        <p id="statusText" class="status-text">スタートを押してください</p>

        <div id="scoreWrap" class="score-wrap">
          <svg
            id="score"
            class="score"
            width="320"
            height="460"
            viewBox="0 0 320 460"
            role="img"
            aria-label="音程を上下にドラッグして合わせる五線譜"
          >
            <line x1="60" y1="174" x2="288" y2="174" stroke="#3a3a3a" stroke-width="1.2" />
            <line x1="60" y1="114" x2="288" y2="114" stroke="#3a3a3a" stroke-width="1.2" />
            <line x1="60" y1="84" x2="288" y2="84" stroke="#3a3a3a" stroke-width="1.2" />
            <line x1="60" y1="55" x2="288" y2="55" stroke="#3a3a3a" stroke-width="1.2" />
            <line x1="60" y1="34" x2="288" y2="34" stroke="#3a3a3a" stroke-width="1.2" />
            <text x="160" y="230" font-size="14" text-anchor="middle" fill="#555555">Safari / Chromeで開いてください</text>
          </svg>
        </div>

        <p id="scriptWarning" class="script-warning">
          このプレビューでは再生できません。共有メニューからSafariやChromeで開くか、WebにアップロードしたURLで開いてください。
        </p>
      </section>

      <div class="actions">
        <button id="mainButton" class="button button-primary" type="button">スタート</button>
      </div>

      <section class="settings" aria-label="設定">
        <label class="check-row">
          <input id="hideDiff" type="checkbox" />
          <span class="fake-check" aria-hidden="true"></span>
          <span>
            <span class="check-title">ズレを非表示</span>
            <span class="check-sub">音だけを頼りに合わせる練習モード</span>
          </span>
        </label>

        <div class="divider"></div>

        <label class="check-row">
          <input id="useSharp" type="checkbox" />
          <span class="fake-check" aria-hidden="true"></span>
          <span>
            <span class="check-title">半音を含める</span>
            <span class="check-sub">ド♯・レ♯などを五線譜と問題に追加</span>
          </span>
        </label>
      </section>

      <p class="note">五線の間隔は周波数の対数スケールに基づいています</p>
    </main>

    <script>
const ALL_NOTES = [
  { name: "C4", label: "ド", freq: 261.63, sharp: false },
  { name: "C#4", label: "ド♯", freq: 277.18, sharp: true },
  { name: "D4", label: "レ", freq: 293.66, sharp: false },
  { name: "D#4", label: "レ♯", freq: 311.13, sharp: true },
  { name: "E4", label: "ミ", freq: 329.63, sharp: false },
  { name: "F4", label: "ファ", freq: 349.23, sharp: false },
  { name: "F#4", label: "ファ♯", freq: 369.99, sharp: true },
  { name: "G4", label: "ソ", freq: 392.0, sharp: false },
  { name: "G#4", label: "ソ♯", freq: 415.3, sharp: true },
  { name: "A4", label: "ラ", freq: 440.0, sharp: false },
  { name: "A#4", label: "ラ♯", freq: 466.16, sharp: true },
  { name: "B4", label: "シ", freq: 493.88, sharp: false },
  { name: "C5", label: "ド", freq: 523.25, sharp: false },
];

const SVG_NS = "http://www.w3.org/2000/svg";
const SVG_W = 320;
const SVG_H = 460;
const RAIL_X = 160;
const STAFF_X1 = 60;
const STAFF_X2 = 288;
const SVG_PAD_TOP = 28;
const SVG_PAD_BOT = 28;
const SNAP_CENTS = 22;
const F_MIN = ALL_NOTES[0].freq * 0.97;
const F_MAX = ALL_NOTES[ALL_NOTES.length - 1].freq * 1.03;

const state = {
  phase: "idle",
  targetNote: null,
  noteFreq: ALL_NOTES[6].freq,
  snappedNote: null,
  snapFlash: false,
  streak: 0,
  hideDiff: false,
  useSharp: false,
  correctAnim: false,
  audio: null,
  drag: null,
  lastSnap: null,
};

document.documentElement.classList.add("js-enabled");

const el = {
  score: document.querySelector("#score"),
  scoreWrap: document.querySelector("#scoreWrap"),
  statusText: document.querySelector("#statusText"),
  streak: document.querySelector("#streak"),
  trainerCard: document.querySelector("#trainerCard"),
  mainButton: document.querySelector("#mainButton"),
  hideDiff: document.querySelector("#hideDiff"),
  useSharp: document.querySelector("#useSharp"),
};

function freqToY(freq) {
  const logMin = Math.log2(F_MIN);
  const logMax = Math.log2(F_MAX);
  const ratio = (Math.log2(freq) - logMin) / (logMax - logMin);
  return SVG_PAD_TOP + (1 - ratio) * (SVG_H - SVG_PAD_TOP - SVG_PAD_BOT);
}

function toCents(f1, f2) {
  return 1200 * Math.log2(f1 / f2);
}

function getActiveNotes() {
  return state.useSharp ? ALL_NOTES : ALL_NOTES.filter((note) => !note.sharp);
}

function nearestNote(rawFreq, notes) {
  let bestDist = Infinity;
  let bestNote = null;

  for (const note of notes) {
    const dist = Math.abs(toCents(rawFreq, note.freq));
    if (dist < bestDist) {
      bestDist = dist;
      bestNote = note;
    }
  }

  return { note: bestNote, cents: bestDist };
}

function getAudio() {
  if (state.audio) return state.audio;

  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  const ctx = new AudioContextClass();
  const userOsc = ctx.createOscillator();
  const userGain = ctx.createGain();
  const targetOsc = ctx.createOscillator();
  const targetGain = ctx.createGain();

  userOsc.type = "sine";
  userOsc.frequency.value = state.noteFreq;
  userGain.gain.value = 0;
  userOsc.connect(userGain);
  userGain.connect(ctx.destination);
  userOsc.start();

  targetOsc.type = "triangle";
  targetOsc.frequency.value = 440;
  targetGain.gain.value = 0;
  targetOsc.connect(targetGain);
  targetGain.connect(ctx.destination);
  targetOsc.start();

  state.audio = { ctx, userOsc, userGain, targetOsc, targetGain };
  return state.audio;
}

function playShot(freq, vol, dur, type = "sine", when = 0) {
  const { ctx } = getAudio();
  const t = ctx.currentTime + when;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}

function playSnapSound(freq) {
  playShot(freq, 0.22, 0.12, "sine");
  playShot(freq * 2, 0.1, 0.08, "sine");
}

function playCorrectSound(freq) {
  const lo = freq / 2;
  const hi = freq * 2;
  const beat = 60 / 160;

  playShot(lo, 0.8, beat * 0.35, "square", 0);
  playShot(lo, 0.8, beat * 0.35, "square", beat * 0.5);
  playShot(hi, 0.85, beat * 0.45, "square", beat * 1.1);
  playShot(hi, 0.85, beat * 0.45, "square", beat * 1.6);
  playShot(freq * 4, 0.4, beat * 0.25, "square", beat * 2.3);
}

function endRound() {
  if (!state.audio) return;

  const { ctx, targetGain, userGain } = state.audio;
  for (const gain of [targetGain, userGain]) {
    gain.gain.cancelScheduledValues(ctx.currentTime);
    gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
  }
}

function newRound() {
  const audio = getAudio();
  const pool = getActiveNotes();
  const note = pool[Math.floor(Math.random() * pool.length)];
  const mid = ALL_NOTES[Math.floor(ALL_NOTES.length / 2)].freq;

  state.phase = "playing";
  state.targetNote = note;
  state.noteFreq = mid;
  state.snappedNote = null;
  state.snapFlash = false;
  state.drag = null;
  state.lastSnap = null;

  audio.targetOsc.frequency.setValueAtTime(note.freq, audio.ctx.currentTime);
  audio.targetGain.gain.cancelScheduledValues(audio.ctx.currentTime);
  audio.targetGain.gain.setValueAtTime(0, audio.ctx.currentTime);
  audio.targetGain.gain.linearRampToValueAtTime(0.14, audio.ctx.currentTime + 0.05);
  render();
}

function setCorrect() {
  state.phase = "correct";
  state.streak += 1;
  state.correctAnim = true;
  endRound();
  playCorrectSound(state.snappedNote.freq);
  render();

  window.setTimeout(() => {
    state.correctAnim = false;
    render();
  }, 1000);
}

function svgElement(name, attrs = {}) {
  const node = document.createElementNS(SVG_NS, name);
  for (const [key, value] of Object.entries(attrs)) {
    node.setAttribute(key, value);
  }
  return node;
}

function addText(parent, attrs, text) {
  const node = svgElement("text", attrs);
  node.textContent = text;
  parent.append(node);
  return node;
}

function renderStaff() {
  const staffYs = [329.63, 392.0, 440.0, 493.88, 523.25].map(freqToY);

  staffYs.forEach((y) => {
    el.score.append(svgElement("line", {
      x1: STAFF_X1,
      y1: y,
      x2: STAFF_X2,
      y2: y,
      stroke: "#3a3a3a",
      "stroke-width": 1.2,
    }));
  });
}

function renderGuides() {
  for (const note of getActiveNotes()) {
    const y = freqToY(note.freq);
    const isSnappedHere = state.snappedNote?.name === note.name;
    const group = svgElement("g");

    group.append(svgElement("line", {
      x1: STAFF_X1,
      y1: y,
      x2: STAFF_X2,
      y2: y,
      stroke: isSnappedHere ? "#999999" : note.sharp ? "#222222" : "#2c2c2c",
      "stroke-width": isSnappedHere ? 2 : note.sharp ? 0.8 : 1,
      "stroke-dasharray": isSnappedHere ? "0" : note.sharp ? "2 8" : "2 6",
    }));

    addText(group, {
      x: STAFF_X1 - 6,
      y: y + 4,
      "font-size": note.sharp ? 8 : 10,
      "text-anchor": "end",
      fill: isSnappedHere ? "#dddddd" : note.sharp ? "#444444" : "#555555",
      "font-weight": isSnappedHere ? 600 : 400,
    }, note.label);

    addText(group, {
      x: STAFF_X2 + 6,
      y: y + 4,
      "font-size": 8,
      "text-anchor": "start",
      fill: "#3a3a3a",
    }, Math.round(note.freq));

    el.score.append(group);
  }
}

function renderUserNote() {
  if (state.phase === "idle") return;

  const userY = freqToY(state.noteFreq);
  const group = svgElement("g", { style: "cursor: ns-resize" });

  if (state.snapFlash || state.snappedNote) {
    group.append(svgElement("ellipse", {
      cx: RAIL_X,
      cy: userY,
      rx: state.snapFlash ? 24 : 20,
      ry: state.snapFlash ? 17 : 14,
      fill: "none",
      stroke: "#eeeeee",
      "stroke-width": state.snapFlash ? 2 : 1,
      opacity: state.snapFlash ? 0.35 : 0.15,
    }));
  }

  group.append(svgElement("line", {
    x1: RAIL_X + 13,
    y1: userY,
    x2: RAIL_X + 13,
    y2: userY - 44,
    stroke: state.phase === "correct" ? "#3ddc66" : "#eeeeee",
    "stroke-width": 2,
  }));

  group.append(svgElement("ellipse", {
    cx: RAIL_X,
    cy: userY,
    rx: 13,
    ry: 8.5,
    fill: state.phase === "correct" ? "#3ddc66" : "#eeeeee",
  }));

  const centDiff = state.targetNote ? Math.round(toCents(state.noteFreq, state.targetNote.freq)) : 0;
  if (state.phase === "playing" && !state.hideDiff && Math.abs(centDiff) > 5) {
    addText(group, {
      x: RAIL_X - 20,
      y: userY + 4,
      "font-size": 10,
      "text-anchor": "end",
      fill: "#777777",
    }, centDiff > 0 ? `+${centDiff}¢` : `${centDiff}¢`);
  }

  el.score.append(group);
}

function renderTargetLine() {
  if (!state.targetNote || state.phase === "idle") return;

  const targetY = freqToY(state.targetNote.freq);
  el.score.append(svgElement("line", {
    x1: STAFF_X1,
    y1: targetY,
    x2: STAFF_X2,
    y2: targetY,
    stroke: "#666666",
    "stroke-width": 1.5,
    "stroke-dasharray": "6 4",
  }));
}

function render() {
  el.score.replaceChildren();
  renderStaff();
  renderGuides();
  renderTargetLine();
  renderUserNote();

  el.trainerCard.classList.toggle("correct", state.correctAnim);
  el.statusText.classList.toggle("correct", state.phase === "correct");

  if (state.phase === "idle") {
    el.statusText.textContent = "スタートを押してください";
    el.mainButton.textContent = "スタート";
    el.mainButton.classList.add("button-primary");
  } else if (state.phase === "playing") {
    el.statusText.textContent = "お題の音に合わせよう";
    el.mainButton.textContent = "スキップ";
    el.mainButton.classList.remove("button-primary");
  } else {
    el.statusText.textContent = `正解！ ${state.targetNote.label}（${state.targetNote.name}）`;
    el.mainButton.textContent = "次の音";
    el.mainButton.classList.add("button-primary");
  }

  el.streak.hidden = state.streak === 0;
  el.streak.textContent = `${state.streak} 連続正解`;
  el.hideDiff.checked = state.hideDiff;
  el.useSharp.checked = state.useSharp;
}

function onPointerDown(event) {
  if (state.phase !== "playing") return;

  event.preventDefault();
  el.score.setPointerCapture(event.pointerId);
  const startFreq = state.snappedNote ? state.snappedNote.freq : state.noteFreq;
  state.drag = { startY: event.clientY, startFreq };

  const { ctx, userGain } = getAudio();
  userGain.gain.cancelScheduledValues(ctx.currentTime);
  userGain.gain.setValueAtTime(userGain.gain.value, ctx.currentTime);
  userGain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.03);
}

function onPointerMove(event) {
  if (!state.drag || state.phase !== "playing") return;

  event.preventDefault();
  const { ctx, userOsc } = getAudio();
  const dy = state.drag.startY - event.clientY;
  const renderedHeight = el.score.getBoundingClientRect().height || SVG_H;
  const dyInSvgUnits = dy * (SVG_H / renderedHeight);
  const semitoneShift = dyInSvgUnits / ((SVG_H - SVG_PAD_TOP - SVG_PAD_BOT) / 12);
  const rawFreq = state.drag.startFreq * Math.pow(2, semitoneShift / 12);
  const clamped = Math.max(F_MIN * 1.01, Math.min(F_MAX * 0.99, rawFreq));
  const { note, cents } = nearestNote(clamped, getActiveNotes());

  if (note && cents < SNAP_CENTS) {
    state.noteFreq = note.freq;
    userOsc.frequency.setValueAtTime(note.freq, ctx.currentTime);

    if (state.lastSnap !== note.name) {
      state.lastSnap = note.name;
      state.snappedNote = note;
      state.snapFlash = true;
      playSnapSound(note.freq);
      render();

      window.setTimeout(() => {
        state.snapFlash = false;
        render();
      }, 120);
      return;
    }
  } else {
    state.noteFreq = clamped;
    userOsc.frequency.setValueAtTime(clamped, ctx.currentTime);
    state.snappedNote = null;
    state.lastSnap = null;
  }

  render();
}

function onPointerUp(event) {
  if (!state.drag) return;

  event.preventDefault();
  state.drag = null;

  if (!state.audio) return;
  const { ctx, userGain } = state.audio;
  userGain.gain.cancelScheduledValues(ctx.currentTime);
  userGain.gain.setValueAtTime(0.35, ctx.currentTime);
  userGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);

  if (state.phase === "playing" && state.snappedNote) {
    const targetFreq = state.audio.targetOsc.frequency.value;
    const isCorrect = Math.abs(Math.log2(state.snappedNote.freq) - Math.log2(targetFreq)) < 0.01;
    if (isCorrect) {
      window.setTimeout(setCorrect, 80);
    }
  }
}

el.mainButton.addEventListener("click", newRound);
el.hideDiff.addEventListener("change", () => {
  state.hideDiff = el.hideDiff.checked;
  render();
});
el.useSharp.addEventListener("change", () => {
  state.useSharp = el.useSharp.checked;
  render();
});
el.score.addEventListener("pointerdown", onPointerDown);
el.score.addEventListener("pointermove", onPointerMove);
el.score.addEventListener("pointerup", onPointerUp);
el.score.addEventListener("pointercancel", onPointerUp);
el.scoreWrap.addEventListener("touchstart", (event) => {
  if (state.drag) event.preventDefault();
}, { passive: false });
el.scoreWrap.addEventListener("touchmove", (event) => {
  if (state.drag) event.preventDefault();
}, { passive: false });
window.addEventListener("pagehide", endRound);

render();

    </script>
  </body>
</html>
